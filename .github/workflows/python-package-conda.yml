name: Run SAWH Yield Model with Conda

on: [push, workflow_dispatch]  # Also allow manual trigger

jobs:
  run-model:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}  # Ensures conda environment is activated

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: 3.11
        environment-file: environment.yml
        activate-environment: my-sawh-env

    - name: Run SAWH Model Script
      run: |
        echo "Running SAWH yield model..."
        python sawh_model.py   # Change to your actual script name
        python Tbl_gen.py # Table generation script

    # Optional: Keep linting and testing if you have tests
    - name: Lint with flake8
      run: |
        conda install flake8 -y
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Upload plots as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SAWH_plots
        path: |
          *.png
          *.jpg
      # or list specific files: isotherm_comparison.png, yield_sensitivity.png
